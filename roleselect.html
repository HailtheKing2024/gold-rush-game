<!DOCTYPE html>
<html>
<head>
    <title>Select Your Role</title>
    <link rel="stylesheet" href="roleselect.css" />
</head>
<body>
  <div class="role-container">
    <h1>Select Your Role</h1>

<div class="roles">
  <!-- Easy: Butler -->
  <div>
    <button class="roleBtn" data-role="merchant">Butler</button>
    <p class="role-description">Better trading prices.</p>
    <p class="role-stats"></p>
  </div>

  <!-- Medium: Miner -->
  <div>
    <button class="roleBtn" data-role="miner">Miner</button>
    <p class="role-description">He starts with knowledge about mining, so he will be able to extract more gold.</p>
    <p class="role-stats"></p>
  </div>

  <!-- Hard: Farmer -->
  <div>
    <button class="roleBtn" data-role="hunter">Farmer</button>
    <p class="role-description">Starts with extra food.</p>
    <p class="role-stats"></p>
  </div>
</div>

  <script src="roleselect.js"></script>
</body>
</html>
