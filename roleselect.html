<!DOCTYPE html>
<html>
<head>
    <title>Select Your Role</title>
    <link rel="stylesheet" href="roleselect.css" />
</head>
<body>
  <div class="role-container">
    <h1>Select Your Role</h1>

    <div class="roles">
      <div>
        <button class="roleBtn" data-role="miner">Miner</button>
        <p class="role-description">Starts with extra gold.</p>
      </div>

      <div>
        <button class="roleBtn" data-role="hunter">Hunter</button>
        <p class="role-description">Starts with extra food.</p>
      </div>

      <div>
        <button class="roleBtn" data-role="merchant">Merchant</button>
        <p class="role-description">Better trading prices.</p>
      </div>
    </div>
  </div>

  <script src="roleSelect.js"></script>
</body>
</html>
