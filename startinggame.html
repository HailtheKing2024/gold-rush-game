<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Rush - Name Your Explorer</title>
    <link rel="stylesheet" href="startinggame.css" />
</head>
<body>
    <div class="tutorial-container" aria-labelledby="starting-heading">
    <h1 id="starting-heading">Welcome, Explorer!</h1>
    <div id="role-display"></div>
    
    <p>Enter a name to begin your journey:</p>
    <input type="text" id="playerNameInput" placeholder="Enter name..." maxlength="40" autocomplete="nickname" />
    <button type="button" id="startBtn">Start Game & Save</button>

    <p id="status" role="status" aria-live="polite"></p>
    </div>

    <script>
        const convexSiteUrl = window.CONVEX_SITE_URL || "https://fastidious-heron-446.convex.site";

        // 1. Show the role they picked on the previous page
        const role = localStorage.getItem("selectedRole");
        const stats = JSON.parse(localStorage.getItem("roleStats"));

        if (role && stats) {
            document.getElementById('role-display').innerText = 
                `You picked: ${role.toUpperCase()} (Difficulty: ${stats.difficulty})`;
        }

        // 2. Handle the Save when they click Start
        document.getElementById('startBtn').addEventListener('click', async () => {
            const name = document.getElementById('playerNameInput').value.trim();
            const status = document.getElementById('status');

            if (!name) {
                alert("Please enter a name!");
                return;
            }

            status.className = "";
            status.classList.add("status-saving");
            status.innerText = "Saving to Convex...";

            try {
                const response = await fetch(`${convexSiteUrl}/api/save-game`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name,
                        role: role,
                        stats: stats
                    })
                });

                if (response.ok) {
                    status.className = "";
                    status.classList.add("status-success");
                    status.innerText = `Game Saved for ${name}! Loading world...`;
                    localStorage.setItem("playerName", name); // Save name for later
                    
                    // Optional: Move to the actual gameplay screen after 1.5 seconds
                     setTimeout(() => { window.location.href = "gameplay.html"; }, 1500);
                } else {
                    status.className = "";
                    status.classList.add("status-error");
                    status.innerText = "Save failed. Check server logs.";
                }
            } catch (err) {
                console.error(err);
                status.className = "";
                status.classList.add("status-error");
                status.innerText = "Error connecting to server.";
            }
        });
    </script>
</body>
</html>
